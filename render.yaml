# Render Blueprint — hosts the read-only API as a free web service.
# In Render: New + -> Blueprint -> connect this repo. Render reads this file.
# You then set the DATABASE_URL secret in the dashboard (it is NOT in the repo).
#
# Free tier note: the service sleeps after ~15 min idle, so the first request
# after a quiet spell takes ~30-60s to wake. Fine for a personal app; upgrade to
# a paid instance later for always-on.
services:
  - type: web
    name: moto-tracker-api
    runtime: python
    plan: free
    region: virginia            # closest to the Neon us-east-1 database
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false             # set this secret in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Live Activity APNs credentials — set values in the Render dashboard.
      - key: APNS_KEY_B64
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
