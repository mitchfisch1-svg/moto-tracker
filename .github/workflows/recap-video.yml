name: recap-video

# Render the ~30s animated race-recap MP4 after race weekends (races are
# Saturdays; this runs early Sunday UTC). The script no-ops when the published
# recap already covers the latest event, so off-week runs are cheap.
on:
  schedule:
    - cron: "0 3 * * 0"     # Sundays 03:00 UTC (~11 pm ET Saturday)
    - cron: "0 15 * * 0"    # Sunday backup pass (in case results posted late)
  workflow_dispatch:

permissions:
  contents: write           # pushes the rendered video to the media branch

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get install -y fonts-liberation
      - run: pip install -r requirements.txt
      - run: python scripts/render_recap_video.py --out recap_out
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Publish to media branch
        run: |
          if [ ! -f recap_out/recap.mp4 ]; then
            echo "Nothing rendered (already up to date)."
            exit 0
          fi
          cd recap_out
          git init -b media
          git config user.name "recap-bot"
          git config user.email "actions@github.com"
          git add recap.mp4 recap.json
          git commit -m "Recap video: $(python -c "import json;print(json.load(open('recap.json'))['event_key'])")"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" media
