name: recap-video

# Render the ~30s animated race-recap MP4 after race weekends (races are
# Saturdays; this runs early Sunday UTC). The script no-ops when the published
# recap already covers the latest event, so off-week runs are cheap.
on:
  schedule:
    - cron: "0 3 * * 0"     # Sundays 03:00 UTC (~11 pm ET Saturday)
    - cron: "0 15 * * 0"    # Sunday backup pass (in case results posted late)
  workflow_dispatch:

permissions:
  contents: write           # pushes the rendered video to the media branch

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get install -y fonts-liberation
      - run: pip install -r requirements.txt
      - run: python scripts/render_recap_video.py --out media_out
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: python scripts/render_season_video.py --out media_out
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Publish to media branch
        run: |
          # Start from whatever is already published so we never drop a video
          # that this run didn't re-render.
          git fetch origin media || true
          git worktree add media_pub origin/media 2>/dev/null || (mkdir -p media_pub && cd media_pub && git init -b media)
          cp -f media_out/recap.mp4 media_out/recap.json media_pub/ 2>/dev/null || true
          cp -f media_out/season.mp4 media_out/season.json media_pub/ 2>/dev/null || true
          cd media_pub
          if [ -z "$(git status --porcelain)" ]; then
            echo "No new videos to publish."
            exit 0
          fi
          git config user.name "recap-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Auto videos $(date -u +%Y-%m-%d)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:media
