name: schedule

# Refresh the SX/MX/SMX calendar weekly (cron is UTC). Also runnable by hand.
on:
  schedule:
    - cron: "0 6 * * 1"     # Mondays at 06:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.scheduler --job schedule
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
