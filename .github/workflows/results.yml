name: results

# Ingest results + standings. The job itself only does work when an event is
# live (it sets event status from start time and skips otherwise), so most runs
# are a quick no-op. cron is UTC.
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (fast standings on race day)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.scheduler --job results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Fire any due push notifications (results, gate-drop, leader swings, news).
      # Runs every time (not just when live) so news + gate-drop alerts work; a
      # failure here shouldn't mask results health.
      - run: python -m src.scheduler --job notify
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
